name: Task or feature
description: A unit of work, a feature request, or a scoped change.
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        For large or unclear chunks of work, prefer a Wayfinder map/ticket — see
        `docs/agents/issue-tracker.md`. This template is for a scoped task or feature.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should exist or change, and why? Use `CONTEXT.md` terms.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve or what does it enable?
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this is done? List testable conditions.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Battle map / tokens
        - Character sheet
        - Rules automation
        - Campaign / session persistence
        - DM view / player view / permissions
        - Dice / chat / session log
        - Content editor
        - AI generation
        - Auth / Discord login
        - Tooling / agent skills / docs
        - Other / not sure
    validations:
      required: true
